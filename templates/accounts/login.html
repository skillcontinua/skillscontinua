{% extends 'base.html' %}

{% block title %}Login - SkillsContinua{% endblock %}

{% block content %}

<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h2 class="text-center fw-bold mb-4">Welcome Back</h2>
                        <p class="text-center text-muted mb-4">Login to continue your learning journey</p>
                        
                        <form method="post">
                            {% csrf_token %}
                            
                            <div class="mb-3">
                                <label for="id_username" class="form-label">Username</label>
                                <input type="text" name="username" id="id_username" class="form-control" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="id_password" class="form-label">Password</label>
                                <input type="password" name="password" id="id_password" class="form-control" required>
                            </div>
                            
                            {% if form.errors %}
                                <div class="alert alert-danger">
                                    <i class="fas fa-exclamation-circle"></i> Invalid username or password
                                </div>
                            {% endif %}
                            
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-sign-in-alt"></i> Login
                            </button>
                        </form>
                        
                        <div class="text-center mt-3">
                            <p class="mb-0">
                                Don't have an account? 
                                <a href="{% url 'accounts:register' %}" class="text-primary">Register here</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
